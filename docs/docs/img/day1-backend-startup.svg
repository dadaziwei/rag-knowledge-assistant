<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="620" viewBox="0 0 1400 620" role="img" aria-labelledby="title desc">
  <title id="title">FastAPI 后端启动时序</title>
  <desc id="desc">展示后端容器启动后加载配置、注册中间件、初始化 MongoDB、Kafka、MinIO、启动 Kafka Consumer 和注册路由的过程。</desc>
  <defs>
    <style>
      .bg { fill: #f7f8fb; }
      .title { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 30px; font-weight: 700; fill: #1d2738; }
      .small { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 14px; fill: #4d5b70; }
      .node { fill: #ffffff; stroke: #263247; stroke-width: 2; rx: 8; }
      .node-main { fill: #e8f2ff; stroke: #1b5faa; stroke-width: 2; rx: 8; }
      .node-data { fill: #fff6df; stroke: #a66a00; stroke-width: 2; rx: 8; }
      .node-job { fill: #e9f8ef; stroke: #168047; stroke-width: 2; rx: 8; }
      .label { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #1d2738; }
      .sub { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 14px; fill: #4d5b70; }
      .arrow { stroke: #506179; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .line { stroke: #c4cad5; stroke-width: 2; fill: none; }
      .step { fill: #253044; }
      .stepText { font-family: Arial, sans-serif; font-size: 15px; font-weight: 700; fill: #ffffff; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#506179"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="620"/>
  <text class="title" x="48" y="58">FastAPI Backend 启动时序</text>
  <text class="small" x="50" y="86">理解启动过程，就能知道服务异常时应该先查配置、依赖连接、后台任务还是路由注册。</text>

  <path class="line" d="M130 280 H1270"/>

  <circle class="step" cx="130" cy="280" r="22"/>
  <text class="stepText" x="125" y="286">1</text>
  <rect class="node-main" x="55" y="150" width="150" height="78"/>
  <text class="label" x="88" y="181">容器启动</text>
  <text class="sub" x="82" y="206">entrypoint</text>

  <circle class="step" cx="310" cy="280" r="22"/>
  <text class="stepText" x="305" y="286">2</text>
  <rect class="node" x="235" y="335" width="150" height="82"/>
  <text class="label" x="268" y="366">加载配置</text>
  <text class="sub" x="262" y="391">Settings / .env</text>

  <circle class="step" cx="490" cy="280" r="22"/>
  <text class="stepText" x="485" y="286">3</text>
  <rect class="node-main" x="415" y="150" width="150" height="78"/>
  <text class="label" x="448" y="181">创建 App</text>
  <text class="sub" x="438" y="206">FastAPIFramework</text>

  <circle class="step" cx="670" cy="280" r="22"/>
  <text class="stepText" x="665" y="286">4</text>
  <rect class="node-data" x="595" y="335" width="150" height="82"/>
  <text class="label" x="622" y="366">连接 Mongo</text>
  <text class="sub" x="618" y="391">创建索引 / 元数据</text>

  <circle class="step" cx="850" cy="280" r="22"/>
  <text class="stepText" x="845" y="286">5</text>
  <rect class="node-data" x="775" y="150" width="150" height="78"/>
  <text class="label" x="814" y="181">初始化 MinIO</text>
  <text class="sub" x="808" y="206">bucket ready</text>

  <circle class="step" cx="1030" cy="280" r="22"/>
  <text class="stepText" x="1025" y="286">6</text>
  <rect class="node-job" x="955" y="335" width="150" height="82"/>
  <text class="label" x="986" y="366">启动 Kafka</text>
  <text class="sub" x="977" y="391">producer + consumer</text>

  <circle class="step" cx="1210" cy="280" r="22"/>
  <text class="stepText" x="1205" y="286">7</text>
  <rect class="node-main" x="1135" y="150" width="150" height="78"/>
  <text class="label" x="1170" y="181">注册路由</text>
  <text class="sub" x="1162" y="206">/api/v1/*</text>

  <path class="arrow" d="M130 228 V255"/>
  <path class="arrow" d="M310 335 V305"/>
  <path class="arrow" d="M490 228 V255"/>
  <path class="arrow" d="M670 335 V305"/>
  <path class="arrow" d="M850 228 V255"/>
  <path class="arrow" d="M1030 335 V305"/>
  <path class="arrow" d="M1210 228 V255"/>

  <text class="small" x="75" y="505">面试表达：FastAPI lifespan 负责初始化 Mongo、MinIO、Kafka producer，并用后台 task 启动 Kafka consumer；关闭时统一释放连接。</text>
  <text class="small" x="75" y="535">排障顺序：容器健康状态 → settings 是否正确 → 外部依赖是否 healthy → Kafka consumer 是否启动 → API 路由是否注册。</text>
</svg>
